spring.application.name=LibraryManagementSystem

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# Directory where files are stored; served at /uploads/**
file.upload-dir=uploads

server.port=8081

# Enable static resource handling
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:src/main/webapp/
spring.mvc.static-path-pattern=/**

# H2 Database Configuration (file-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/librarydb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Initialize data after Hibernate creates the schema
spring.sql.init.mode=always

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp